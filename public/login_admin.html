<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIT - Connexion Administrateur</title>
  <link rel="stylesheet" href="login_admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <p class="page-title">connexion au compte<br>administrateur</p>

  <div class="center-wrapper">

    <div class="logo-circle">
      <div class="logo-inner">
        <img src="images/profile.jpg" alt="photo profil" class="profile-img" />
        <div class="logo-text">
          <span class="fs-text">fs</span>
          <span class="fit-text">FIT</span>
        </div>
      </div>
    </div>

    <div class="form-wrapper">

      <div class="input-group">
        <span class="icon">&#9899;</span>
        <input type="text" placeholder="Email or Phone" />
      </div>

      <div class="input-group">
        <span class="icon">&#128274;</span>
        <input type="password" placeholder="Password" />
      </div>

      <div class="bottom-card">
        <p class="forgot">Forgot Password?</p>
        <button class="login-btn">Login</button>
      </div>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
