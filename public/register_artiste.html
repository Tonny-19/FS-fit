<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIT - Créer compte artiste</title>
  <link rel="stylesheet" href="register_shared.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <p class="page-title">Creer un<br>compte artiste</p>

  <div class="logo-box"><span>FS</span></div>
  <p class="site-name">FSfit galerie house</p>

  <div class="form-wrapper">
    <input type="text" class="field" placeholder="name" />
    <input type="email" class="field" placeholder="email" />
    <input type="password" class="field" placeholder="password" />
    <input type="password" class="field" placeholder="Confirm Password" />

    <div class="bottom-row">
      <div class="checkbox-wrap">
        <input type="checkbox" id="terms" />
      </div>
      <button class="btn-red" onclick="window.location.href='register_artiste_paiement.html'">SUIVANT</button>
    </div>
  </div>

  <span class="signup-link" onclick="window.location.href='login_artiste.html'">Sign Up</span>

</body>
</html>
