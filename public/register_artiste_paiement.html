<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIT - Infos bancaires</title>
  <link rel="stylesheet" href="register_shared.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="logo-box"><span>FS</span></div>
  <p class="site-name">FSfit galerie house</p>

  <div class="form-wrapper">
    <input type="tel" class="field" placeholder="Entrez le numero de téléphone" />
    <input type="text" class="field" placeholder="numero de carte bancaire" />
    <input type="text" class="field" placeholder="Nom complet" />
    <input type="text" class="field" placeholder="date d'expiration de la carte" />

    <div class="bottom-row">
      <div class="checkbox-wrap">
        <input type="checkbox" id="terms" />
      </div>
      <button class="btn-red" onclick="window.location.href='verify_code.html'">SUIVANT</button>
    </div>
  </div>

  <span class="signup-link" onclick="window.location.href='login_artiste.html'">Sign Up</span>

</body>
</html>
